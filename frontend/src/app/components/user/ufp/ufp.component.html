<div class="container">
    <form>
      <div class="input-group">
        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="userobj.email" name="email" required>
      </div>
      <br>
      <div class="input-group">
        <label for="password">Enter new Password:</label>
        <input type="password" id="password" [(ngModel)]="userobj.newPassword" name="password" required>
      </div>
      <br>
      <br>
      <div class="button-group">
        <button type="button" class="btn btn-primary" (click)="onSubmit()">Submit</button>
      </div>
    </form>
    <div class="top-right-image">
      <img src="/assets/image/login.png" alt="Description" class="small-image">
    </div>
    <div *ngIf="message" class="message">{{ message }}</div>
</div>
