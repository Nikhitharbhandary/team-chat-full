
<div class="container">
  
    <div class="form-container">
  <form >


    <div class="input-group">
      <label for="name"> Name:</label>
      <input type="text" id="name" [(ngModel)]="userobj.name" name="name" >
    </div>
    <br>
    <div class="input-group">
      <label for="phone">Phone:</label>
      <input type="number" id="phone" [(ngModel)]="userobj.phone" name="phone" >
    </div>
    <br>
    <div class="input-group">
      <label for="address">Address:</label>
      <input type="text" id="address" [(ngModel)]="userobj.address" name="address" >
    </div>
    <br>
    <div class="input-group">
      <label for="date">Date od birth:</label>
      <input type="date" id="dob" [(ngModel)]="userobj.dob" name="dob" >
    </div>
    <br>
    <div class="input-group">
      <label for="email">Email:</label>
      <input type="email" id="email" [(ngModel)]="userobj.email" name="email" >
    </div>
    <br>
    <div class="input-group">
      <label for="password">Password:</label>
      <input type="password" id="password" [(ngModel)]="userobj.password" name="password" >
    </div>
    <div class="button-group">
      <button type="submit" class="btn btn-primary" (click)="onSubmit()">Register</button>
    </div>
  </form>
  <div class="top-right-image">
    <img src="/assets/image/reg.png" alt="Description" class="small-image">
  </div>
</div>
  </div>
